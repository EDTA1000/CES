<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه اصلی CES</title>
    <link rel="stylesheet" href="main.css">
    <!-- لینک کردن کتابخانه GSAP برای انیمیشن‌های پیشرفته -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CSSRulePlugin.min.js"></script>
</head>
<body>

    <div class="header-animation">
        <!-- این عناصر با CSS و JS انیمیشن داده می شوند -->
        <img id="wheel-img" src="/path/to/Wheel.png" alt="Wheel">
        <img id="lighting-img" src="/path/to/lighting.png" alt="Lighting">
        <img id="CES-img" src="/path/to/CES.png" alt="CES">
    </div>

    <div class="main-content">
        <div id="subscription-button-area">
            <!-- دکمه ها بر اساس وضعیت کاربر اینجا نمایش داده می شوند -->
            <button id="subscribe-btn" class="btn btn-primary">خرید اشتراک</button>
        </div>

        <div class="comment-section">
            <h2>ثبت نظر</h2>
            <div class="comment-controls">
                <textarea id="comment-text" placeholder="نظر خود را بنویسید..."></textarea>
                <div class="actions">
                    <button id="submit-comment-btn" class="btn btn-primary">ثبت نظر</button>
                    <div class="like-dislike">
                        <button id="dislike-btn" class="btn btn-danger">Dislike <span id="dislike-count">0</span></button>
                        <button id="like-btn" class="btn btn-success">Like <span id="like-count">0</span></button>
                    </div>
                </div>
            </div>
            
            <h3>نظرات کاربران</h3>
            <div id="comments-list">
                <!-- نظرات قبلی اینجا بارگذاری می شوند -->
            </div>
        </div>
    </div>


    <script src="main.js"></script>
</body>
</html>
