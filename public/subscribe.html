<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/picture/Icon.png">
    <title>خرید اشتراک CES</title>
    <link rel="stylesheet" href="subscribe.css">
</head>
<body dir="rtl">
    <img id="subscribe-animation-gif" src="https://raw.githubusercontent.com/EDTA1000/CES/master/public/picture/subscribe-animation.gif" alt="subscribe-animation">
    <div class="subscribe-page">
        <h1>خرید اشتراک</h1>

        <div id="email-form-container" class="email-box">
            <h2>ثبت ایمیل</h2>
            <input type="email" id="email" placeholder="ایمیل خود را وارد کنید">
            <button id="subscribe-submit-btn" class="btn btn-primary">ادامه</button>
        </div>

        <div id="subscription-plans" class="plans-box hidden">
            <h2>انتخاب اشتراک</h2>

            <div class="plan-card">
                <h3>هفت روزه - رایگان</h3>
                <p>یکبار مصرف</p>
                <button class="btn btn-success" onclick="buyPlan('7days-free')">دریافت اشتراک</button>
            </div>

            <div class="plan-card">
                <h3>یک ماهه</h3>
                <button class="btn btn-primary" onclick="buyPlan('1month')">خرید</button>
            </div>

            <div class="plan-card">
                <h3>سه ماهه</h3>
                <button class="btn btn-primary" onclick="buyPlan('3months')">خرید</button>
            </div>

            <div class="plan-card">
                <h3>شش ماهه</h3>
                <button class="btn btn-primary" onclick="buyPlan('6months')">خرید</button>
            </div>

            <div class="plan-card">
                <h3>نه ماهه</h3>
                <button class="btn btn-primary" onclick="buyPlan('9months')">خرید</button>
            </div>

            <div class="plan-card">
                <h3>یک ساله</h3>
                <button class="btn btn-primary" onclick="buyPlan('1year')">خرید</button>
            </div>
        </div>

        <div id="content-container"></div>
    </div>

    <script src="subscribe.js"></script>
</body>
</html>
