<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/picture/Icon.png">
    <title>CES</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="profile-area"></div>

    <div class="header-animation">
        <div class="top-images-container">
            <img id="wheel-img" class="header-img" src="https://raw.githubusercontent.com/EDTA1000/CES/master/public/picture/Wheel.png" alt="Wheel">
            <img id="lighting-img" class="header-img" src="https://raw.githubusercontent.com/EDTA1000/CES/master/public/picture/lighting.png" alt="Lighting">
        </div>
        <img id="CES-img" class="header-img" src="https://raw.githubusercontent.com/EDTA1000/CES/master/public/picture/CES.png" alt="CES">
    </div>

    <div class="main-content">
        <div id="email-form-container">
            <input type="email" id="email" placeholder="ایمیل خود را وارد کنید...">
            <button onclick="handleSubscribe()" class="btn">ثبت ایمیل و نمایش پلن‌ها</button>
        </div>

        <div id="subscription-plans" style="display: none;">
            <button onclick="buyPlan('basic')" class="btn">خرید بسته پایه</button>
            <button onclick="buyPlan('pro')" class="btn">خرید بسته حرفه‌ای</button>
        </div>

        <div id="content-container"></div>

        <div class="admin-navigation" style="margin: 20px; text-align: center;">
            <button id="goto-create-piece" class="btn btn-secondary">ورود به صفحه ساخت قطعه</button>
            <button id="goto-simulation" class="btn btn-secondary">ورود به صفحه شبیه‌سازی</button>
        </div>

        <div class="comment-section">
            <h2>ثبت نظر</h2>
            <div class="comment-controls">
                <textarea id="comment-input-global" placeholder="نظر خود را بنویسید..."></textarea>
                <button onclick="handleComment('global')" class="btn btn-primary">ثبت نظر</button>
            </div>
            
            <h3>نظرات کاربران</h3>
            <div id="comments-list-global"></div>
        </div>
    </div>
    <script src="subscribe.js"></script>
    <script src="main.js"></script>
</body>
</html>
